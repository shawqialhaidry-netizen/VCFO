# Disposable PostgreSQL for local pytest (avoids clashing with dev DB credentials).
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   set TEST_DATABASE_URL=postgresql+psycopg2://vcfo:vcfo@127.0.0.1:5433/vcfo_test
#   python -m pytest tests/test_scope_resolver.py -v
services:
  postgres-test:
    image: postgres:16-alpine
    container_name: vcfo-postgres-test
    environment:
      POSTGRES_USER: vcfo
      POSTGRES_PASSWORD: vcfo
      POSTGRES_DB: vcfo_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcfo -d vcfo_test"]
      interval: 3s
      timeout: 5s
      retries: 10
