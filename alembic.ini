# alembic.ini - VCFO database migration configuration
#
# Run migrations:
#   alembic upgrade head          <- apply all pending migrations
#   alembic upgrade +1            <- apply next migration only
#   alembic downgrade -1          <- roll back last migration
#   alembic current               <- show current revision
#   alembic history               <- list all revisions
#   alembic revision -m "msg"     <- create a new empty revision
#   alembic revision --autogenerate -m "msg"  <- auto-detect model changes

[alembic]
script_location = alembic
prepend_sys_path = .

# Database URL - reads from environment / .env via app.core.config
# Override here only for local dev without .env:
# sqlalchemy.url = sqlite:///./data/vcfo.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
